spring.application.name=XiaMenBackGround

# MySQL
spring.datasource.url=jdbc:mysql://81.70.135.119:3306/my_database?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
