<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>导出料仓数据 - 后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/common-style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">后台管理系统</a>
        <div class="d-flex text-white">
            <span class="me-3"><i class="bi bi-person"></i> <span th:text="${user.name}"></span> (<span th:text="${user.role}"></span>)</span>
            <a class="btn btn-outline-light btn-sm me-2" href="/logout">退出</a>
        </div>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 bg-light sidebar py-3" style="min-height: calc(100vh - 56px);">
            <ul class="nav flex-column">
                <li class="nav-item" th:if="${user.role == '管理员'}"><a class="nav-link" href="/users"><i class="bi bi-people"></i> 用户管理</a></li>
                <li class="nav-item" th:if="${user.role == '管理员' or user.role == '调度主管'}"><a class="nav-link" href="/equipment"><i class="bi bi-gear"></i> 设备基础信息</a></li>
                <li class="nav-item"><a class="nav-link active" href="/production"><i class="bi bi-graph-up"></i> 设备生产信息</a></li>
            </ul>
        </nav>
        <main class="col-md-10 ms-sm-auto px-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>导出料仓数据</h3>
                <a href="/production?activeTab=silo-tab" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> 返回</a>
            </div>

            <!-- 工具栏 -->
            <div class="card mb-3">
                <div class="card-body">
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-primary" onclick="exportSelected()"><i class="bi bi-download"></i> 导出选中项</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="selectAll()"><i class="bi bi-check-all"></i> 全选</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="unselectAll()"><i class="bi bi-x-lg"></i> 全不选</button>
                    </div>
                </div>
            </div>

            <!-- 数据表格 -->
            <div class="card">
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(silos)}" class="text-center py-4 text-muted">暂无数据可导出</div>
                    <table class="table table-striped" th:unless="${#lists.isEmpty(silos)}">
                        <thead>
                            <tr>
                                <th width="50"><input type="checkbox" id="selectAllCheckbox" onclick="toggleSelectAll()"></th>
                                <th>序号</th>
                                <th>料仓编号</th>
                                <th>物料信息</th>
                                <th>料仓容量(m³)</th>
                                <th>料仓余量(%)</th>
                                <th>料仓状态</th>
                                <th>近24h工作量(m³)</th>
                                <th>近7天工作量(m³)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s, iterStat : ${silos}" th:attr="data-silo-id=${s.id}">
                                <td><input type="checkbox" name="selectedIds" th:value="${s.id}" class="item-checkbox"></td>
                                <td th:text="${iterStat.index + 1}"></td>
                                <td th:text="${s.cangId}"></td>
                                <td th:text="${s.materialInfo}"></td>
                                <td th:text="${s.cangCapacity != null ? s.cangCapacity : '-'}"></td>
                                <td th:text="${s.cangCapacity != null && s.cangCapacity > 0 && s.remain != null ? #numbers.formatDecimal(s.remain / s.cangCapacity * 100, 1, 1) + '%' : '-'}"></td>
                                <td>
                                    <span th:if="${s.cangStatus}" class="text-success">启用</span>
                                    <span th:unless="${s.cangStatus}" class="text-danger">未启用</span>
                                </td>
                                <td th:text="${work24hMap[s.cangId] != null ? work24hMap[s.cangId] : 0.0}"></td>
                                <td th:text="${work1wMap[s.cangId] != null ? work1wMap[s.cangId] : 0.0}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div id="notifyBox" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:6px;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.15);cursor:pointer;" onclick="this.style.display='none'"></div>

<script>
function notify(msg, type) {
    var box = document.getElementById('notifyBox');
    box.textContent = msg;
    box.style.display = 'block';
    box.style.background = type === 'error' ? '#f8d7da' : type === 'warn' ? '#fff3cd' : '#d1e7dd';
    box.style.color = type === 'error' ? '#842029' : type === 'warn' ? '#664d03' : '#0f5132';
    clearTimeout(box._t);
    box._t = setTimeout(function() { box.style.display = 'none'; }, 3000);
}

// 全选/全不选切换
function toggleSelectAll() {
    var selectAll = document.getElementById('selectAllCheckbox').checked;
    var checkboxes = document.querySelectorAll('.item-checkbox');
    checkboxes.forEach(function(cb) { cb.checked = selectAll; });
}

// 全选
function selectAll() {
    var checkboxes = document.querySelectorAll('.item-checkbox');
    checkboxes.forEach(function(cb) { cb.checked = true; });
    document.getElementById('selectAllCheckbox').checked = true;
}

// 全不选
function unselectAll() {
    var checkboxes = document.querySelectorAll('.item-checkbox');
    checkboxes.forEach(function(cb) { cb.checked = false; });
    document.getElementById('selectAllCheckbox').checked = false;
}

// 导出选中项
function exportSelected() {
    var selectedIds = [];
    var checkboxes = document.querySelectorAll('.item-checkbox:checked');
    
    if (checkboxes.length === 0) {
        notify('请至少选择一条记录', 'warn');
        return;
    }
    
    checkboxes.forEach(function(cb) {
        selectedIds.push(cb.value);
    });
    
    var params = new URLSearchParams();
    selectedIds.forEach(function(id) {
        params.append('ids', id);
    });
    
    fetch('/production/export-silo?' + params.toString(), { method: 'POST' })
    .then(function(response) {
        var disposition = response.headers.get('Content-Disposition');
        var filename = 'silo_export.json';
        if (disposition) {
            var match = disposition.match(/filename\*?=(?:UTF-8'')?([^;\s"]+)/i);
            if (match) filename = decodeURIComponent(match[1]);
        }
        return response.blob().then(function(blob) {
            return { blob: blob, filename: filename };
        });
    })
    .then(function(result) {
        var url = window.URL.createObjectURL(result.blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = result.filename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        notify('导出成功，文件已保存到下载文件夹', 'success');
    })
    .catch(function() { notify('导出失败，请重试', 'error'); });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
