<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>料斗管理 - 后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/common-style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">后台管理系统</a>
        <div class="d-flex text-white">
            <span class="me-3"><i class="bi bi-person"></i> <span th:text="${user.name}"></span> (<span th:text="${user.role}"></span>)</span>
            <a class="btn btn-outline-light btn-sm me-2" href="/logout">退出</a>
            <button class="btn btn-outline-light btn-sm" id="exitBtn" onclick="exitToUnity()"><i class="bi bi-box-arrow-left"></i> 退出到调度端</button>
        </div>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 bg-light sidebar py-3" style="min-height: calc(100vh - 56px);">
            <ul class="nav flex-column">
                <li class="nav-item" th:if="${user.role == '管理员'}"><a class="nav-link" href="/users"><i class="bi bi-people"></i> 用户管理</a></li>
                <li class="nav-item"><a class="nav-link active" href="/equipment"><i class="bi bi-gear"></i> 设备基础信息</a></li>
                <li class="nav-item"><a class="nav-link" href="/production"><i class="bi bi-graph-up"></i> 设备生产信息</a></li>
            </ul>
        </nav>
        <main class="col-md-10 ms-sm-auto px-4 py-4">
            <h3 class="mb-4">料斗信息管理</h3>

            <!-- 添加料斗 -->
            <div class="card mb-4">
                <div class="card-header">添加料斗</div>
                <div class="card-body">
                    <form method="post" action="/hoppers/add" class="row g-3">
                        <div class="col-md-2"><input type="number" name="douId" class="form-control" placeholder="斗ID" required></div>
                        <div class="col-md-3"><input type="text" name="materialInfo" class="form-control" placeholder="物料信息" required></div>
                        <div class="col-md-2"><input type="number" step="0.1" name="remain" class="form-control" placeholder="剩余量"></div>
                        <div class="col-md-2"><button type="submit" class="btn btn-primary">添加</button></div>
                    </form>
                </div>
            </div>

            <!-- 料斗列表 -->
            <div class="card">
                <div class="card-header">料斗列表</div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead><tr><th>ID</th><th>斗ID</th><th>物料信息</th><th>剩余量</th><th>操作</th></tr></thead>
                        <tbody>
                        <tr th:each="h : ${hoppers}">
                            <td th:text="${h.id}"></td>
                            <td th:text="${h.douId}"></td>
                            <td th:text="${h.materialInfo}"></td>
                            <td th:text="${h.remain}"></td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary"
                                        data-bs-toggle="modal" data-bs-target="#editModal"
                                        th:attr="data-id=${h.id}, data-douid=${h.douId}, data-materialinfo=${h.materialInfo}, data-remain=${h.remain}">
                                    <i class="bi bi-pencil"></i> 编辑
                                </button>
                                <form th:action="@{'/hoppers/delete/' + ${h.id}}" method="post" style="display:inline" onsubmit="return confirm('确定删除?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> 删除</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- 编辑模态框 -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑料斗</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editForm" method="post">
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">斗ID</label><input type="number" name="douId" id="editDouId" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">物料信息</label><input type="text" name="materialInfo" id="editMaterialInfo" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">剩余量</label><input type="number" step="0.1" name="remain" id="editRemain" class="form-control"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.querySelectorAll('[data-bs-toggle="modal"]').forEach(btn => {
    btn.addEventListener('click', function() {
        document.getElementById('editForm').action = '/hoppers/update/' + this.dataset.id;
        document.getElementById('editDouId').value = this.dataset.douid;
        document.getElementById('editMaterialInfo').value = this.dataset.materialinfo;
        document.getElementById('editRemain').value = this.dataset.remain;
    });
});
</script>
<script>
// Unity 退出功能
var fromPage = (function() {
    var params = new URLSearchParams(window.location.search);
    var from = params.get('from');
    if (from === 'video' || from === 'dispatch') return from;
    return 'dispatch';
})();

function exitToUnity() {
    if (window.vuplex) {
        var message = fromPage === 'video' ? 'navigateToVideo' : 'navigateToDispatch';
        window.vuplex.postMessage(message);
        console.log('[WebView] 已发送退出消息:', message);
    } else {
        notify('当前不在 Unity 环境中，请手动关闭此页面', 'warn');
        console.warn('[WebView] Unity bridge not available');
    }
}
</script>
<div id="notifyBox" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:6px;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.15);cursor:pointer;" onclick="this.style.display='none'"></div>
<script>
function notify(msg, type) {
    var box = document.getElementById('notifyBox');
    box.textContent = msg;
    box.style.display = 'block';
    box.style.background = type === 'error' ? '#f8d7da' : type === 'warn' ? '#fff3cd' : '#d1e7dd';
    box.style.color = type === 'error' ? '#842029' : type === 'warn' ? '#664d03' : '#0f5132';
    clearTimeout(box._t);
    box._t = setTimeout(function() { box.style.display = 'none'; }, 3000);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
