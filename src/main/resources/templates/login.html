<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驾驶舱管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #0a1628 0%, #0d1f3c 50%, #0f2847 100%);
            overflow: hidden;
            position: relative;
        }

        /* 背景网格 */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 180, 216, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 216, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }



        /* 登录容器 */
        .login-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* 标题样式 */
        .system-title {
            color: #00b4d8;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 4px;
            text-shadow: 
                0 0 10px rgba(0, 180, 216, 0.5),
                0 0 20px rgba(0, 180, 216, 0.3),
                0 0 30px rgba(0, 180, 216, 0.2);
            margin-bottom: 20px;
        }

        /* 科技边框卡片 */
        .login-card {
            position: relative;
            width: 400px;
            padding: 40px;
            background: rgba(13, 31, 60, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 180, 216, 0.4);
            border-radius: 4px;
        }

        /* 四角装饰 */
        .login-card::before,
        .login-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #00b4d8;
            border-style: solid;
        }

        .login-card::before {
            top: -2px;
            left: -2px;
            border-width: 3px 0 0 3px;
        }

        .login-card::after {
            top: -2px;
            right: -2px;
            border-width: 3px 3px 0 0;
        }

        .card-corner-bottom-left,
        .card-corner-bottom-right {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #00b4d8;
            border-style: solid;
        }

        .card-corner-bottom-left {
            bottom: -2px;
            left: -2px;
            border-width: 0 0 3px 3px;
        }

        .card-corner-bottom-right {
            bottom: -2px;
            right: -2px;
            border-width: 0 3px 3px 0;
        }



        .login-title {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            text-align: center;
            margin-bottom: 36px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* 输入框样式 */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #00b4d8;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #00b4d8;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            background: rgba(0, 30, 60, 0.6);
            border: 1px solid rgba(0, 180, 216, 0.3);
            border-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(0, 180, 216, 0.4);
        }

        .form-group input:focus {
            background: rgba(0, 40, 80, 0.7);
            border-color: #00b4d8;
        }

        /* 登录按钮 */
        .btn-login {
            width: 100%;
            padding: 10px;
            background: linear-gradient(180deg, #00b4d8 0%, #0077b6 100%);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        .btn-login:hover {
            background: linear-gradient(180deg, #00c8f0 0%, #0088cc 100%);
        }

        /* 错误提示 */
        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 4px;
            color: #ff6b6b;
            font-size: 13px;
            padding: 10px 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 退出按钮 */
        .exit-wrapper {
            text-align: center;
        }

        .btn-exit {
            padding: 8px 24px;
            background: transparent;
            border: 1px solid rgba(0, 180, 216, 0.4);
            border-radius: 4px;
            color: #00b4d8;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .btn-exit:hover {
            background: rgba(0, 180, 216, 0.1);
            border-color: #00b4d8;
        }

        .btn-exit i {
            margin-right: 6px;
            font-size: 14px;
        }

        /* 解锁弹窗模式：仅显示表单卡片 */
        body.unlock-mode { background: transparent; }
        body.unlock-mode .grid-bg,
        body.unlock-mode .system-title,
        body.unlock-mode .exit-wrapper,
        body.unlock-mode .card-corner-bottom-left,
        body.unlock-mode .card-corner-bottom-right {
            display: none !important;
        }
        body.unlock-mode .login-wrapper { gap: 0; }
        body.unlock-mode .login-card {
            width: 280px;
            padding: 20px;
        }
        body.unlock-mode .login-title { font-size: 18px; margin-bottom: 4px; }
        body.unlock-mode .login-subtitle { margin-bottom: 16px; font-size: 12px; }
        body.unlock-mode .form-group { margin-bottom: 12px; }
        body.unlock-mode .btn-login { margin-top: 12px; }
    </style>
</head>
<body>
<div class="grid-bg"></div>

<div class="login-wrapper">
    <h1 class="system-title">调度系统后台管理</h1>
    
    <div class="login-card">
        <div class="card-corner-bottom-left"></div>
        <div class="card-corner-bottom-right"></div>

        <div id="loginError" class="alert alert-danger" style="display:none;"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form id="loginForm" onsubmit="return doLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <input type="text" name="username" id="username" required placeholder="请输入账号">
                    <i class="bi bi-person-fill"></i>
                </div>
            </div>
            <div class="form-group">
                <label>密 码</label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="password" required placeholder="请输入密码">
                    <i class="bi bi-lock-fill"></i>
                    <button type="button" onclick="togglePwd('password', this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#00b4d8;cursor:pointer;padding:0;"><i class="bi bi-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登 录</button>
        </form>
    </div>

    <div class="exit-wrapper">
        <button type="button" class="btn-exit" onclick="exitToUnity()"><i class="bi bi-box-arrow-left"></i>退出到调度端</button>
    </div>
</div>

<script>
// 密码显示/隐藏切换
function togglePwd(inputId, btn) {
    var inp = document.getElementById(inputId);
    var icon = btn.querySelector('i');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

var fromPage = (function() {
    var params = new URLSearchParams(window.location.search);
    var from = params.get('from');
    if (from === 'video' || from === 'dispatch') return from;
    return 'dispatch';
})();

// 检测是否为启动登录模式（Unity 打开 .exe 时的首次登录）
var isStartupMode = (function() {
    var params = new URLSearchParams(window.location.search);
    return params.get('mode') === 'startup';
})();

if (isStartupMode) {
    document.querySelector('.system-title').textContent = '厦门装载机远程调度监控系统';
    document.querySelector('.btn-login').textContent = '进入系统';
    var exitBtn = document.querySelector('.exit-wrapper');
    if (exitBtn) exitBtn.style.display = 'none';
}

// 检测是否为解锁验证模式（锁定后重新登录）
var isUnlockMode = (function() {
    var params = new URLSearchParams(window.location.search);
    return params.get('mode') === 'unlock';
})();

if (isUnlockMode) {
    document.body.classList.add('unlock-mode');
    var exitBtn2 = document.querySelector('.exit-wrapper');
    if (exitBtn2) exitBtn2.style.display = 'none';
}

// AJAX 登录
function doLogin(e) {
    e.preventDefault();
    var btn = document.getElementById('loginBtn');
    var errBox = document.getElementById('loginError');
    errBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '登录中...';

    var formData = new URLSearchParams();
    formData.append('username', document.getElementById('username').value);
    formData.append('password', document.getElementById('password').value);

    fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString()
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        btn.disabled = false;
        btn.textContent = '登 录';
        if (data.success) {
            // 保存 Token 到 localStorage
            localStorage.setItem('authToken', data.token);
            localStorage.setItem('authRole', data.role);
            localStorage.setItem('authName', data.name);
            // 通过 vuplex 把 Token 和角色信息传给 Unity
            if (window.vuplex) {
                window.vuplex.postMessage(JSON.stringify({
                    type: 'loginSuccess',
                    token: data.token,
                    role: data.role,
                    name: data.name
                }));
                console.log('[WebView] 已发送 Token 给 Unity');
            }
            if (isStartupMode || isUnlockMode) {
                // 启动登录/解锁验证模式：只发 loginSuccess，Unity 会自动处理
                console.log('[WebView] 登录成功，等待 Unity 处理');
            } else {
                // 普通模式：通知 Unity 切换到对应页面
                setTimeout(function() {
                    if (window.vuplex) {
                        var message = fromPage === 'video' ? 'navigateToVideo' : 'navigateToDispatch';
                        window.vuplex.postMessage(message);
                    }
                }, 300);
            }
        } else {
            errBox.textContent = data.message || '登录失败';
            errBox.style.display = 'block';
        }
    })
    .catch(function(err) {
        btn.disabled = false;
        btn.textContent = '登 录';
        errBox.textContent = '网络错误，请重试';
        errBox.style.display = 'block';
        console.error('[Login] 请求失败:', err);
    });
    return false;
}

function exitToUnity() {
    if (window.vuplex) {
        if (isStartupMode) {
            // 启动模式下退出按钮用于关闭应用
            window.vuplex.postMessage('exitApp');
            console.log('[WebView] 已发送退出应用消息');
        } else {
            var message = fromPage === 'video' ? 'navigateToVideo' : 'navigateToDispatch';
            window.vuplex.postMessage(message);
            console.log('[WebView] 已发送退出消息:', message);
        }
    } else {
        notify('当前不在 Unity 环境中，请手动关闭此页面', 'warn');
        console.warn('[WebView] Unity bridge not available');
    }
}
</script>
<div id="notifyBox" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:6px;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.15);cursor:pointer;" onclick="this.style.display='none'"></div>
<script>
function notify(msg, type) {
    var box = document.getElementById('notifyBox');
    box.textContent = msg;
    box.style.display = 'block';
    box.style.background = type === 'error' ? '#f8d7da' : type === 'warn' ? '#fff3cd' : '#d1e7dd';
    box.style.color = type === 'error' ? '#842029' : type === 'warn' ? '#664d03' : '#0f5132';
    clearTimeout(box._t);
    box._t = setTimeout(function() { box.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
