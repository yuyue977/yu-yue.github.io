<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户管理 - 后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/common-style.css" rel="stylesheet">
</head>
<body th:attr="data-current-role=${user.role}">
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">后台管理系统</a>
        <div class="d-flex text-white">
            <span class="me-3"><i class="bi bi-person"></i> <span th:text="${user.name}"></span> (<span th:text="${user.role}"></span>)</span>
            <a class="btn btn-outline-light btn-sm me-2" href="/logout">退出</a>
            <button class="btn btn-outline-light btn-sm" id="exitBtn" onclick="exitToUnity()"><i class="bi bi-box-arrow-left"></i> 退出到调度端</button>
        </div>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 bg-light sidebar py-3" style="min-height: calc(100vh - 56px);">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="/users"><i class="bi bi-people"></i> 用户管理</a></li>
                <li class="nav-item" th:if="${user.role == '管理员' or user.role == '调度主管'}"><a class="nav-link" href="/equipment"><i class="bi bi-gear"></i> 设备基础信息</a></li>
                <li class="nav-item" th:if="${user.role == '管理员' or user.role == '调度主管' or user.role == '调度员'}"><a class="nav-link" href="/production"><i class="bi bi-graph-up"></i> 设备生产信息</a></li>
            </ul>
        </nav>
        <main class="col-md-10 ms-sm-auto px-4 py-4">
            <h3 class="mb-4">用户管理</h3>

            <!-- 删除错误提示 -->
            <div th:if="${deleteError}" class="alert alert-warning alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle"></i> <span th:text="${deleteError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Tab导航 -->
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#admin-tab">管理员</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#supervisor-tab">调度主管</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#dispatcher-tab">调度员</a>
                </li>
            </ul>

            <!-- Tab内容 -->
            <div class="tab-content">
                <!-- 管理员Tab -->
                <div class="tab-pane fade show active" id="admin-tab">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>管理员列表</span>
                            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addModal" data-role="管理员">
                                <i class="bi bi-plus"></i> 添加管理员
                            </button>
                        </div>
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead><tr><th>ID</th><th>姓名</th><th>账号</th><th>角色</th><th>电话</th><th>操作</th></tr></thead>
                                <tbody>
                                <tr th:each="u,iterStat : ${adminUsers}">
                                    <td th:text="${iterStat.index + 1}"></td>
                                    <td th:text="${u.name}"></td>
                                    <td th:text="${u.username}"></td>
                                    <td><span th:text="${u.role}"></span></td>
                                    <td th:text="${u.telephone}"></td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary"
                                                data-bs-toggle="modal" data-bs-target="#editModal"
                                                th:attr="data-id=${u.id}, data-name=${u.name}, data-role=${u.role}, data-telephone=${u.telephone}, data-username=${u.username}">
                                            <i class="bi bi-pencil"></i> 编辑
                                        </button>
                                        <!-- admin 账号为系统内置，永远不允许删除 -->
                                        <form th:if="${u.username != 'admin'}" th:action="@{'/users/delete/' + ${u.id}}" method="post" style="display:inline" onsubmit="return confirm('确定删除?')">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> 删除</button>
                                        </form>
                                        <span th:if="${u.username == 'admin'}" class="badge bg-secondary ms-1">系统账号</span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 调度主管Tab -->
                <div class="tab-pane fade" id="supervisor-tab">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>调度主管列表</span>
                            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addModal" data-role="调度主管">
                                <i class="bi bi-plus"></i> 添加调度主管
                            </button>
                        </div>
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead><tr><th>ID</th><th>姓名</th><th>账号</th><th>角色</th><th>电话</th><th>操作</th></tr></thead>
                                <tbody id="supervisor-tbody">
                                <tr th:each="u,iterStat : ${supervisorUsers}">
                                    <td th:text="${iterStat.index + 1}"></td>
                                    <td th:text="${u.name}"></td>
                                    <td th:text="${u.username}"></td>
                                    <td><span th:text="${u.role}"></span></td>
                                    <td th:text="${u.telephone}"></td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary"
                                                data-bs-toggle="modal" data-bs-target="#editModal"
                                                th:attr="data-id=${u.id}, data-name=${u.name}, data-role=${u.role}, data-telephone=${u.telephone}, data-username=${u.username}">
                                            <i class="bi bi-pencil"></i> 编辑
                                        </button>
                                        <button type="button" class="btn btn-sm btn-outline-danger" th:onclick="|deleteUser(${u.id},'调度主管')|">
                                            <i class="bi bi-trash"></i> 删除
                                        </button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 调度员Tab -->
                <div class="tab-pane fade" id="dispatcher-tab">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>调度员列表</span>
                            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addModal" data-role="调度员">
                                <i class="bi bi-plus"></i> 添加调度员
                            </button>
                        </div>
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead><tr><th>ID</th><th>姓名</th><th>账号</th><th>角色</th><th>电话</th><th>操作</th></tr></thead>
                                <tbody id="dispatcher-tbody">
                                <tr th:each="u,iterStat : ${dispatcherUsers}">
                                    <td th:text="${iterStat.index + 1}"></td>
                                    <td th:text="${u.name}"></td>
                                    <td th:text="${u.username}"></td>
                                    <td><span th:text="${u.role}"></span></td>
                                    <td th:text="${u.telephone}"></td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary"
                                                data-bs-toggle="modal" data-bs-target="#editModal"
                                                th:attr="data-id=${u.id}, data-name=${u.name}, data-role=${u.role}, data-telephone=${u.telephone}, data-username=${u.username}">
                                            <i class="bi bi-pencil"></i> 编辑
                                        </button>
                                        <button type="button" class="btn btn-sm btn-outline-danger" th:onclick="|deleteUser(${u.id},'调度员')|">
                                            <i class="bi bi-trash"></i> 删除
                                        </button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- 添加模态框 -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">添加用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="addForm" method="post" action="/users/add" accept-charset="UTF-8">
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">姓名</label><input type="text" name="name" class="form-control" required maxlength="3"></div>
                    <div class="mb-3"><label class="form-label">角色</label><input type="text" name="role" id="addRole" class="form-control" readonly></div>
                    <div class="mb-3"><label class="form-label">账号</label><input type="text" name="username" class="form-control" required pattern="[A-Za-z0-9]+" title="仅允许大小写英文字母和数字"></div>
                    <div class="mb-3"><label class="form-label">密码</label>
                        <div class="input-group">
                            <input type="password" name="password" id="addPassword" class="form-control" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('addPassword', this)" tabindex="-1"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3"><label class="form-label">电话</label><input type="text" name="telephone" class="form-control" required maxlength="20"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">添加</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 编辑模态框 -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editForm" method="post" accept-charset="UTF-8">
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">姓名</label><input type="text" name="name" id="editName" class="form-control" required maxlength="3"></div>
                    <div class="mb-3"><label class="form-label">角色</label><input type="text" name="role" id="editRole" class="form-control" required maxlength="10"></div>
                    <div class="mb-3"><label class="form-label">账号</label><input type="text" name="username" id="editUsername" class="form-control" pattern="[A-Za-z0-9]+" title="仅允许大小写英文字母和数字"></div>
                    <div class="mb-3"><label class="form-label">密码</label>
                        <div class="input-group">
                            <input type="password" name="password" id="editPassword" class="form-control" placeholder="不修改则留空">
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('editPassword', this)" tabindex="-1"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3"><label class="form-label">电话</label><input type="text" name="telephone" id="editTelephone" class="form-control" required maxlength="20"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="notifyBox" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:6px;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.15);cursor:pointer;" onclick="this.style.display='none'"></div>

<script>
function notify(msg, type) {
    var box = document.getElementById('notifyBox');
    box.textContent = msg;
    box.style.display = 'block';
    box.style.background = type === 'error' ? '#f8d7da' : type === 'warn' ? '#fff3cd' : '#d1e7dd';
    box.style.color = type === 'error' ? '#842029' : type === 'warn' ? '#664d03' : '#0f5132';
    clearTimeout(box._t);
    box._t = setTimeout(function() { box.style.display = 'none'; }, 3000);
}
</script>

<script>
// 密码显示/隐藏切换
function togglePwd(inputId, btn) {
    var inp = document.getElementById(inputId);
    var icon = btn.querySelector('i');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
// 弹窗每次打开时重置密码字段为隐藏状态
['addModal', 'editModal'].forEach(function(modalId) {
    document.getElementById(modalId).addEventListener('shown.bs.modal', function() {
        this.querySelectorAll('input').forEach(function(inp) {
            if (inp.name === 'password') {
                inp.type = 'password';
                var btn = inp.closest('.input-group').querySelector('button i');
                if (btn) btn.className = 'bi bi-eye';
            }
        });
    });
});
</script>

<script>
// 当前登录用户角色
const currentRole = document.body.dataset.currentRole;
// 需要走 AJAX 无刷新操作的角色
const ajaxRoles = ['调度主管', '调度员'];

// 内存中的列表数据（与后端同步）
let supervisorUsers = /*[[${supervisorUsers}]]*/ [];
let dispatcherUsers = /*[[${dispatcherUsers}]]*/ [];

// HTML 转义
function esc(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
}
function attr(v) {
    if (v == null) return '';
    return String(v).replace(/"/g, '&quot;');
}

// 重建调度主管表格
function regenerateSupervisorTable() {
    const tbody = document.getElementById('supervisor-tbody');
    if (!supervisorUsers.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">暂无数据</td></tr>';
        return;
    }
    tbody.innerHTML = supervisorUsers.map((u, i) => `
        <tr>
            <td>${i + 1}</td>
            <td>${esc(u.name)}</td>
            <td>${esc(u.username)}</td>
            <td>${esc(u.role)}</td>
            <td>${esc(u.telephone)}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary"
                        data-bs-toggle="modal" data-bs-target="#editModal"
                        data-id="${u.id}" data-name="${attr(u.name)}" data-role="${attr(u.role)}" data-telephone="${attr(u.telephone)}" data-username="${attr(u.username)}">
                    <i class="bi bi-pencil"></i> 编辑
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id},'${esc(u.role)}')">
                    <i class="bi bi-trash"></i> 删除
                </button>
            </td>
        </tr>`).join('');
    bindEditButtons();
}

// 重建调度员表格
function regenerateDispatcherTable() {
    const tbody = document.getElementById('dispatcher-tbody');
    if (!dispatcherUsers.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">暂无数据</td></tr>';
        return;
    }
    tbody.innerHTML = dispatcherUsers.map((u, i) => `
        <tr>
            <td>${i + 1}</td>
            <td>${esc(u.name)}</td>
            <td>${esc(u.username)}</td>
            <td>${esc(u.role)}</td>
            <td>${esc(u.telephone)}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary"
                        data-bs-toggle="modal" data-bs-target="#editModal"
                        data-id="${u.id}" data-name="${attr(u.name)}" data-role="${attr(u.role)}" data-telephone="${attr(u.telephone)}" data-username="${attr(u.username)}">
                    <i class="bi bi-pencil"></i> 编辑
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id},'${esc(u.role)}')">
                    <i class="bi bi-trash"></i> 删除
                </button>
            </td>
        </tr>`).join('');
    bindEditButtons();
}

// 绑定编辑按钮事件
function bindEditButtons() {
    document.querySelectorAll('[data-bs-target="#editModal"]').forEach(btn => {
        btn.addEventListener('click', function() {
            document.getElementById('editForm').action = '/users/update/' + this.dataset.id;
            document.getElementById('editName').value = this.dataset.name;
            document.getElementById('editRole').value = this.dataset.role;
            document.getElementById('editTelephone').value = this.dataset.telephone;
            document.getElementById('editUsername').value = this.dataset.username || '';
        });
    });
}
bindEditButtons();

// 设置添加弹窗的角色字段
let currentAddRole = '';
document.querySelectorAll('[data-bs-target="#addModal"]').forEach(btn => {
    btn.addEventListener('click', function() {
        currentAddRole = this.dataset.role;
        document.getElementById('addRole').value = currentAddRole;
    });
});

// 拦截添加表单提交
document.getElementById('addForm').addEventListener('submit', function(e) {
    if (ajaxRoles.includes(currentAddRole)) {
        e.preventDefault();
        const formData = new FormData(this);
        fetch('/users/api/add', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
                    this.reset();
                    if (currentAddRole === '调度主管') {
                        supervisorUsers.push(data.user);
                        regenerateSupervisorTable();
                    } else if (currentAddRole === '调度员') {
                        dispatcherUsers.push(data.user);
                        regenerateDispatcherTable();
                    }
                } else {
                    notify('添加失败，请重试', 'error');
                }
            })
            .catch(() => notify('网络请求失败', 'error'));
    }
    // 管理员角色走原有表单提交（页面跳转）
});

// AJAX 删除用户
function deleteUser(id, role) {
    if (!confirm('确定删除?')) return;
    fetch('/users/api/delete/' + id, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                if (role === '调度主管') {
                    supervisorUsers = supervisorUsers.filter(u => u.id !== id);
                    regenerateSupervisorTable();
                } else if (role === '调度员') {
                    dispatcherUsers = dispatcherUsers.filter(u => u.id !== id);
                    regenerateDispatcherTable();
                }
            } else {
                notify(data.message || '删除失败，请重试', 'error');
            }
        })
        .catch(() => notify('网络请求失败', 'error'));
}
</script>
<script>
// Unity 退出功能
var fromPage = (function() {
    var params = new URLSearchParams(window.location.search);
    var from = params.get('from');
    if (from === 'video' || from === 'dispatch') return from;
    return 'dispatch';
})();

function exitToUnity() {
    if (window.vuplex) {
        var message = fromPage === 'video' ? 'navigateToVideo' : 'navigateToDispatch';
        window.vuplex.postMessage(message);
        console.log('[WebView] 已发送退出消息:', message);
    } else {
        notify('当前不在 Unity 环境中，请手动关闭此页面', 'warn');
        console.warn('[WebView] Unity bridge not available');
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
